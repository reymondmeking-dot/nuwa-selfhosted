name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: py${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install (editable)
        run: pip install -e .
      - name: CLI - version
        run: nuwa-selfhosted version
      - name: CLI - help
        run: nuwa-selfhosted --help
      - name: Sanity import
        run: python -c "import nuwa_selfhosted; print(nuwa_selfhosted.__version__)"
